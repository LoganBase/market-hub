<script type="text/babel">
// Market Hub mobile — Glance view.
// Structural cards (regime…equities) + Crowd Signals rendered via CardRow.
// Daily Brief and Macro Brief rendered via dedicated card rows and deep-dives.
const { useState, useEffect, useRef } = React;

// ── Data hooks ────────────────────────────────────────────────────────────────
function useGlance() {
  const [D, setD] = useState(window.GLANCE);
  useEffect(() => {
    let alive = true;
    if (window.MarketHubData) {
      window.MarketHubData.loadGlance()
        .then((live) => { if (alive && live) setD(live); })
        .catch(() => {});
    }
    return () => { alive = false; };
  }, []);
  return D;
}

function useDailyBrief() {
  const [brief, setBrief] = useState(null);
  useEffect(() => {
    let alive = true;
    if (window.MarketHubData) {
      window.MarketHubData.loadDailyBrief()
        .then((d) => { if (alive && d && !d.error) setBrief(d); })
        .catch(() => {});
    }
    return () => { alive = false; };
  }, []);
  return brief;
}

function useMacroBrief() {
  const [brief, setBrief] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    let alive = true;
    if (window.MarketHubData) {
      window.MarketHubData.loadMacroBrief()
        .then((d) => { if (alive) { if (d && !d.error) setBrief(d); setLoading(false); } })
        .catch(() => { if (alive) setLoading(false); });
    } else {
      setLoading(false);
    }
    return () => { alive = false; };
  }, []);
  return { brief, loading };
}

// ── Shared constants ──────────────────────────────────────────────────────────
const SIG = {
  bullish: { c: '#22c55e', glow: 'rgba(34,197,94,.35)', fill: 'rgba(34,197,94,.12)', line: 'rgba(34,197,94,.25)', word: 'BULLISH' },
  neutral: { c: '#f59e0b', glow: 'rgba(245,158,11,.35)', fill: 'rgba(245,158,11,.10)', line: 'rgba(245,158,11,.20)', word: 'NEUTRAL' },
  bearish: { c: '#ef4444', glow: 'rgba(239,68,68,.35)',  fill: 'rgba(239,68,68,.10)',  line: 'rgba(239,68,68,.20)',  word: 'BEARISH' },
};
const MONO = "'SF Mono','JetBrains Mono','Fira Code',ui-monospace,Menlo,Consolas,monospace";
const SANS = "'Inter',-apple-system,system-ui,sans-serif";

function postureColor(label) { return /off/i.test(label) ? '#ef4444' : /on/i.test(label) ? '#22c55e' : '#f59e0b'; }
function sentimentColor(s) {
  if (s == null) return '#f59e0b';
  return s >= 2 ? '#22c55e' : s <= -2 ? '#ef4444' : '#f59e0b';
}
function _tc(st) { return st === 'bullish' ? '#22c55e' : st === 'bearish' ? '#ef4444' : '#f59e0b'; }

// ── Market Diagnostics (ported from desktop-parts.jsx — full q/a/c format) ──
function buildRegimeDiagnostics(card) {
  const rows = card.rows || [], stats = card.stats || [];
  const r1 = rows[0], r2 = rows[1], r3 = rows[2];
  const findStat = (label) => stats.find((s) => s[0] === label);
  const pctStat = findStat('Percentile Rank'), durStat = findStat('Regime Duration'), velStat = findStat('Extension Velocity');
  const toneOfStatus = (st) => st === 'bullish' ? '#22c55e' : st === 'bearish' ? '#ef4444' : '#f59e0b';
  const toneOfStat   = (t)  => t  === 'pos'     ? '#22c55e' : t  === 'neg'     ? '#ef4444' : '#f59e0b';
  const pctNum = pctStat ? parseInt(pctStat[1], 10) : null;
  const durNum = durStat ? parseInt(durStat[1], 10) : null;
  const velNum = velStat ? parseFloat(velStat[1]) : null;
  const pctAction = pctNum == null ? null : pctNum >= 90 ? 'Reduce Exposure' : pctNum >= 70 ? 'Monitor for Reversion' : pctNum <= 10 ? 'Watch for Bounce' : pctNum <= 30 ? 'Watch for Reversal' : 'No Action';
  const durAction = durNum == null ? null : durNum > 250 ? 'Trail Stops' : durNum > 60 ? 'Hold Core' : durNum < 10 ? 'Await Confirmation' : 'Monitor';
  const velAction = velNum == null ? null : velNum > 0.05 ? 'Monitor Stretch' : velNum < -0.05 ? 'Pressure Easing' : 'No Signal Change';
  return [
    { label: 'SPY Regime',         q: 'How is the prevailing market environment categorized?',                    a: r1 ? r1[2] : '—', c: r1 ? toneOfStatus(r1[3]) : '#94a3b8' },
    { label: 'Stretch Risk',       q: 'To what degree has the market become overextended?',                       a: r2 ? r2[2] : '—', c: r2 ? toneOfStatus(r2[3]) : '#94a3b8' },
    { label: 'Trend Cross',        q: 'Has the present market trend been confirmed?',                             a: r3 ? r3[2] : '—', c: r3 ? toneOfStatus(r3[3]) : '#94a3b8' },
    { label: 'Percentile Rank',    q: 'Define the current period in context to historical precedents?',           a: pctStat ? `${pctStat[1]} percentile of all historical days — ${pctAction}` : '—', c: pctStat ? toneOfStat(pctStat[3]) : '#94a3b8' },
    { label: 'Regime Duration',    q: 'How persistent is the present market cycle?',                              a: durStat ? `${durStat[1]} ${durStat[2]} — ${durAction}` : '—', c: durStat ? toneOfStat(durStat[3]) : '#94a3b8' },
    { label: 'Extension Velocity', q: 'Is market momentum accelerating or decelerating?',                        a: velStat ? `${velStat[1]} (${velStat[2]}) — ${velAction}` : '—', c: velStat ? toneOfStat(velStat[3]) : '#94a3b8' },
  ];
}
function buildLeadershipDiagnostics(card, computedStats) {
  const rows = card.rows || [], stats = computedStats || card.stats || [];
  const toneOfStatus = (st) => st === 'bullish' ? '#22c55e' : st === 'bearish' ? '#ef4444' : '#f59e0b';
  const toneOfStat   = (t)  => t  === 'pos'     ? '#22c55e' : t  === 'neg'     ? '#ef4444' : '#f59e0b';
  const r0 = rows[0], r1 = rows[1], r2 = rows[2];
  const mktSpreadStat  = stats.find(s => { const l = (s[0]||'').toLowerCase(); return !l.includes('streak') && !l.includes('tech') && !l.includes('qqew') && !l.includes('qqq') && !l.includes('growth') && !l.includes('style'); });
  const streakStat     = stats.find(s => (s[0]||'').toLowerCase().includes('streak'));
  const techSpreadStat = stats.find(s => { const l = (s[0]||'').toLowerCase(); return l.includes('tech') || l.includes('qqew') || l.includes('qqq'); });
  const spreadA = mktSpreadStat  ? `${mktSpreadStat[1]}  —  ${mktSpreadStat[2]}`  : '—';
  const techA   = techSpreadStat ? `${techSpreadStat[1]}  —  ${techSpreadStat[2]}` : '—';
  const streakA = streakStat     ? `${streakStat[1]} ${streakStat[2]}`             : '—';
  return [
    { label: 'Market Breadth', q: 'Is the current market rally broad-based or fragile?',                                                                          a: r0 ? (r0[2] || '—') : '—', c: r0 ? toneOfStatus(r0[3]) : '#94a3b8' },
    { label: 'Tech Breadth',   q: 'Is the technology market rally broad-based or concentrated in mega-cap?',                                                      a: r1 ? (r1[2] || '—') : '—', c: r1 ? toneOfStatus(r1[3]) : '#94a3b8' },
    { label: 'Style Bias',     q: 'Is the market rotating to stable value-oriented or higher-risk high-multiple growth companies?',                               a: r2 ? (r2[2] || '—') : '—', c: r2 ? toneOfStatus(r2[3]) : '#94a3b8' },
    { label: 'Market Spread',  q: 'How does the equal-weighted and cap-weighted S&P 500 compare over a time range?',                                             a: spreadA, c: mktSpreadStat  ? toneOfStat(mktSpreadStat[3])  : '#94a3b8' },
    { label: 'Tech Spread',    q: 'How does the equal-weighted and cap-weighted NASDAQ 100 compare over a time range?',                                          a: techA,   c: techSpreadStat ? toneOfStat(techSpreadStat[3]) : '#94a3b8' },
    { label: 'Daily Streak',   q: 'How long has the current trend of outperformance or underperformance persisted on a day-to-day basis?',                       a: streakA, c: streakStat     ? toneOfStat(streakStat[3])     : '#94a3b8' },
  ];
}
function buildBreadthDiagnostics(card) {
  const rows = card.rows || [];
  const r0 = rows[0], r1 = rows[1], r2 = rows[2], r3 = rows[3];
  const p0 = r0 ? parseFloat(r0[1]) : null, p1 = r1 ? parseFloat(r1[1]) : null;
  const zone = p0 == null ? 'No data' : p0 >= 70 ? `Bull Zone — ${p0.toFixed(1)}% above 200d; broad participation confirmed` : p0 >= 40 ? `Mixed Zone — ${p0.toFixed(1)}% above 200d; market is bifurcating` : `Bear Zone — ${p0.toFixed(1)}% above 200d; broad exposure carries elevated risk`;
  const zoneColor  = p0 == null ? '#94a3b8' : p0 >= 70 ? '#22c55e' : p0 >= 40 ? '#f59e0b' : '#ef4444';
  const align = p0 != null && p1 != null ? (p0 >= 60 && p1 >= 60 ? 'Bullishly Aligned — both 50d and 200d breadth confirm the uptrend; durable setup' : p0 < 40 && p1 < 40 ? 'Bearishly Aligned — both measures confirm deterioration; no near-term floor visible' : Math.abs(p0 - p1) > 20 ? 'Diverging — watch the faster 50d SMA for an early-turn signal' : 'Neutral Mix — no strong alignment; monitor for convergence') : '—';
  const alignColor = p0 != null && p1 != null ? (p0 >= 60 && p1 >= 60 ? '#22c55e' : p0 < 40 && p1 < 40 ? '#ef4444' : '#f59e0b') : '#94a3b8';
  return [
    { label: 'NYSE 200d Breadth',       q: 'What % of NYSE stocks are above their 200-day SMA?',                                          a: r0 ? r0[2] : '—', c: r0 ? _tc(r0[3]) : '#94a3b8' },
    { label: 'NYSE 50d Breadth',        q: 'What % of NYSE stocks are above their 50-day SMA?',                                           a: r1 ? r1[2] : '—', c: r1 ? _tc(r1[3]) : '#94a3b8' },
    { label: 'Sector Breadth',          q: 'How many S&P 500 sector ETFs are above their 200-day SMA?',                                   a: r2 ? r2[2] : '—', c: r2 ? _tc(r2[3]) : '#94a3b8' },
    { label: 'Consumer Health Check',   q: 'Is the Consumer Discretionary equal-weight ETF (RSPD) above its 200d SMA?',                  a: r3 ? r3[2] : '—', c: r3 ? _tc(r3[3]) : '#94a3b8' },
    { label: 'Breadth Zone',            q: 'What zone is the long-term breadth reading in, and what does it imply?',                      a: zone,              c: zoneColor  },
    { label: '50d vs 200d Alignment',   q: 'Are short and long-term breadth signals pointing in the same direction?',                     a: align,             c: alignColor },
  ];
}
function buildValuationsDiagnostics(card) {
  const rows = card.rows || [];
  const r0 = rows[0], r1 = rows[1], r2 = rows[2], r3 = rows[3];
  const capeVal = r1 ? parseFloat(r1[1]) : null;
  const capeImpl = capeVal == null ? '—' : capeVal > 35 ? `At ${capeVal.toFixed(1)}× — 10-year real returns historically 0–2% p.a.; favour cash flow over growth` : capeVal > 25 ? `At ${capeVal.toFixed(1)}× — expected 10-year real returns below the ~6% historical average; quality bias is prudent` : `At ${capeVal.toFixed(1)}× — near long-run average; forward return expectations are more normal`;
  const capeImplColor = capeVal == null ? '#94a3b8' : capeVal > 35 ? '#ef4444' : capeVal > 25 ? '#f59e0b' : '#22c55e';
  const statuses = rows.slice(0, 3).map(r => r ? r[3] : null).filter(Boolean);
  const allBear = statuses.length > 0 && statuses.every(s => s === 'bearish');
  const allBull = statuses.length > 0 && statuses.every(s => s === 'bullish');
  const consistency = allBear ? 'All Three Signals Bearish — valuation risk is broad-based; multiples are uniformly elevated' : allBull ? 'All Three Signals Constructive — valuation metrics near average; near-normal expected returns' : 'Mixed Signals — weight CAPE and Buffett Indicator over Trailing P/E for long-run return outlook';
  const consistencyColor = allBear ? '#ef4444' : allBull ? '#22c55e' : '#f59e0b';
  return [
    { label: 'Trailing P/E (S&P 500)', q: 'Is the current price-to-earnings ratio elevated vs history?',                      a: r0 ? r0[2] : '—', c: r0 ? _tc(r0[3]) : '#94a3b8' },
    { label: 'CAPE (Shiller)',          q: 'What does the cyclically adjusted P/E (10-yr earnings) say about long-run value?', a: r1 ? r1[2] : '—', c: r1 ? _tc(r1[3]) : '#94a3b8' },
    { label: 'Buffett Indicator',       q: 'Is total US market cap elevated relative to GDP?',                                 a: r2 ? r2[2] : '—', c: r2 ? _tc(r2[3]) : '#94a3b8' },
    { label: 'Japan vs US Valuation',   q: 'Do international equities (Japan/EWJ) offer a valuation advantage over US?',      a: r3 ? r3[2] : '—', c: r3 ? _tc(r3[3]) : '#94a3b8' },
    { label: 'CAPE Return Implication', q: 'What do current CAPE levels imply for expected 10-year real returns?',             a: capeImpl,          c: capeImplColor },
    { label: 'Signal Consistency',      q: 'Do all three valuation signals agree, or is there a mixed read?',                  a: consistency,       c: consistencyColor },
  ];
}
function buildYieldDiagnostics(card) {
  const rows = card.rows || [];
  const r0 = rows[0], r1 = rows[1], r2 = rows[2], r3 = rows[3];
  const y30 = r0 ? parseFloat(r0[1]) : null;
  const threshold = y30 == null ? '—' : y30 >= 5 ? `${y30.toFixed(2)}% — ABOVE the 5% critical level; equity multiple compression historically confirmed` : y30 > 4.5 ? `${y30.toFixed(2)}% — approaching 5%; elevated but not yet at the critical threshold` : `${y30.toFixed(2)}% — below 5%; long-duration assets and growth equities are supported`;
  const threshColor = y30 == null ? '#94a3b8' : y30 >= 5 ? '#ef4444' : y30 > 4.5 ? '#f59e0b' : '#22c55e';
  const actionA = r0 && r2 ? (r0[3]==='bearish'&&r2[3]==='bearish' ? 'Both 30Y yield and curve are bearish — shorten duration aggressively, hold cash, avoid rate-sensitive sectors' : r0[3]==='bullish'&&r2[3]==='bullish' ? 'Both 30Y yield and curve are constructive — maintain equity and bond exposure; duration is not a drag' : 'Mixed signals — reduce new rate-sensitive adds; wait for yield level and curve to align') : '—';
  const actionColor = r0 && r2 ? (r0[3]==='bearish'&&r2[3]==='bearish' ? '#ef4444' : r0[3]==='bullish'&&r2[3]==='bullish' ? '#22c55e' : '#f59e0b') : '#94a3b8';
  return [
    { label: '30Y Yield (^TYX)',      q: 'Is the 30-year yield above the critical 5% threshold for equity multiples?',                                            a: r0 ? r0[2] : '—', c: r0 ? _tc(r0[3]) : '#94a3b8' },
    { label: '10Y Yield (^TNX)',      q: 'Is the 10-year yield in restrictive territory (≥4.5%)?',                                                                a: r1 ? r1[2] : '—', c: r1 ? _tc(r1[3]) : '#94a3b8' },
    { label: 'Yield Curve (3m–10Y)',  q: 'Is the yield curve inverted, flat, or steepening?',                                                                     a: r2 ? r2[2] : '—', c: r2 ? _tc(r2[3]) : '#94a3b8' },
    { label: '2Y Trend (SHY)',        q: 'Is the 2yr Treasury ETF above or below its 200-day average — is the short end easing or tightening?',                  a: r3 ? r3[2] : '—', c: r3 ? _tc(r3[3]) : '#94a3b8' },
    { label: '5% Threshold Check',   q: 'Has the 30-year yield crossed the historically critical 5% level?',                                                     a: threshold,         c: threshColor },
    { label: 'Combined Rate Action', q: 'What is the combined signal from yield level and curve shape?',                                                          a: actionA,           c: actionColor },
  ];
}
function buildCreditDiagnostics(card) {
  const rows = card.rows || [];
  const r0 = rows[0], r1 = rows[1], r2 = rows[2], r3 = rows[3];
  const leadingA = r0 == null ? '—' : r0[3]==='bearish' ? 'Active — HYG is below its 200d SMA; historically leads equity drawdowns by 4–6 weeks' : 'Not Active — HYG is above its 200d SMA; no leading credit stress signal at this time';

  return [
    { label: 'HYG — Risk Appetite',      q: 'Is the High-Yield ETF above its 200d SMA, signalling healthy credit?',        a: r0 ? r0[2] : '—', c: r0 ? _tc(r0[3]) : '#94a3b8' },
    { label: 'Spread Signal (HY vs IG)', q: 'Is the spread widening driven by credit default risk or interest rate moves?', a: r1 ? r1[2] : '—', c: r1 ? _tc(r1[3]) : '#94a3b8' },
    { label: 'LQD — Investment Grade',   q: 'Is investment-grade credit demand firm, indicating no systemic stress?',       a: r2 ? r2[2] : '—', c: r2 ? _tc(r2[3]) : '#94a3b8' },
    { label: 'EMB — EM Debt',            q: 'Is EM credit stable, or is contagion risk spreading to global credit?',        a: r3 ? r3[2] : '—', c: r3 ? _tc(r3[3]) : '#94a3b8' },
    { label: 'Leading Signal Status',    q: 'Is HYG currently flashing an early warning for equity markets?',               a: leadingA,          c: leadingColor },
    { label: 'Portfolio Action',         q: 'What is the overall portfolio action implied by the current credit picture?',  a: actionA,           c: actionColor },

function buildGlobalFlowsDiagnostics(card) {
  const rows = card.rows || [];
  const byR = (label) => rows.find(r => (r[0]||'').toLowerCase() === label.toLowerCase());
  const rGlobal = byR('Global'), rUsa = byR('USA'), rEurope = byR('Europe'), rEm = byR('Emerging');
  const bullCount = rows.filter(r => r[3]==='bullish').length;
  const usVsIntl = rUsa ? (rUsa[3]==='bullish' ? 'US is above its 200d SMA — domestic leadership intact; a US-first allocation bias is justified until international breadth improves' : 'US is below its 200d SMA — domestic leadership broken; consider reallocating toward regions still above their 200d SMA') : '—';
  const usVsColor = rUsa ? _tc(rUsa[3]) : '#94a3b8';
  const globalAction = bullCount >= 6 ? 'Broad global expansion — maintain full international allocation; equal-weight regional exposure' : bullCount >= 4 ? 'Partial expansion — favour the strongest regions; underweight those below their 200d SMA' : bullCount >= 2 ? 'Global weakness — raise cash and shift toward the few regions with intact trends' : 'Broad global weakness — underweight international equity; favour domestic or cash';
  const actionColor = bullCount >= 6 ? '#22c55e' : bullCount >= 4 ? '#f59e0b' : '#ef4444';
  return [
    { label: 'ACWI — Global Benchmark', q: 'Is the global equity benchmark (ACWI) in a bull or bear market?',               a: rGlobal ? rGlobal[2] : '—', c: rGlobal ? _tc(rGlobal[3]) : '#94a3b8' },
    { label: 'USA (S&P 500)',            q: 'Is the US equity market above its 200d SMA and providing leadership?',          a: rUsa    ? rUsa[2]    : '—', c: rUsa    ? _tc(rUsa[3])    : '#94a3b8' },
    { label: 'Europe (Euro STOXX)',      q: 'Is European equity in an uptrend or a downtrend vs its 200d SMA?',              a: rEurope ? rEurope[2] : '—', c: rEurope ? _tc(rEurope[3]) : '#94a3b8' },
    { label: 'Emerging Markets (EEM)',   q: 'Are EM equities risk-on or risk-off relative to their 200d SMA?',               a: rEm     ? rEm[2]     : '—', c: rEm     ? _tc(rEm[3])     : '#94a3b8' },
    { label: 'US vs International',      q: 'Is domestic or international leadership more intact right now?',                a: usVsIntl,                   c: usVsColor },
    { label: 'Global Allocation Action', q: 'What does the breadth of global signals imply for regional allocation?',        a: globalAction,               c: actionColor },

}
function buildSectorsDiagnostics(card) {
  const rows = card.rows || [], stats = card.stats || [];
  const sCycDef = stats.find(s => (s[0]||'').toLowerCase().includes('cyclical vs') || (s[0]||'').toLowerCase().includes('cyc vs'));
  const sCycs   = stats.find(s => (s[0]||'').toLowerCase() === 'cyclicals');
  const sDefs   = stats.find(s => (s[0]||'').toLowerCase() === 'defensives');

// ── Seeded sparkline ──────────────────────────────────────────────────────────
function Spark({ seed, trend, color, w = 64, h = 24 }) {
  const pts = [];
  let v = 0.5, s = seed * 9301 + 49297;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const N = 22;
  for (let i = 0; i < N; i++) { v += (rnd() - 0.5) * 0.22 + trend * 0.018; v = Math.max(0.08, Math.min(0.92, v)); pts.push(v); }
  const dx = w / (N - 1);
  const line = pts.map((p, i) => `${i ? 'L' : 'M'}${(i * dx).toFixed(1)},${(h - p * h).toFixed(1)}`).join(' ');
  const area = `${line} L${w},${h} L0,${h} Z`;
  const id = `g${seed}`;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: 'block' }}>
      <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stopColor={color} stopOpacity="0.28" /><stop offset="1" stopColor={color} stopOpacity="0" />
      </linearGradient></defs>
      <path d={area} fill={`url(#${id})`} />
      <path d={line} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

// ── Hero breadth ring ─────────────────────────────────────────────────────────
function HeroGauge({ exec }) {
  const total = exec.bull + exec.neutral + exec.bear;
  const color = postureColor(exec.label);
  const R = 78, C = 2 * Math.PI * R, gap = 7;
  const segDefs = [['bullish', exec.bull], ['neutral', exec.neutral], ['bearish', exec.bear]].filter((s) => s[1] > 0);
  let acc = 0;
  const arcs = segDefs.map(([k, n]) => { const len = (n / total) * C; const off = acc; acc += len; return { k, len, off, c: SIG[k].c, glow: SIG[k].glow }; });
  const [mounted, setMounted] = useState(false);
  useEffect(() => { const t = setTimeout(() => setMounted(true), 120); return () => clearTimeout(t); }, []);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '8px 0 4px' }}>
      <div style={{ position: 'relative', width: 196, height: 196 }}>
        <div style={{ position: 'absolute', inset: 18, borderRadius: '50%', boxShadow: `0 0 56px ${color}44`, opacity: mounted ? 1 : 0, transition: 'opacity 1s ease' }} />
        <svg width="196" height="196" viewBox="0 0 196 196" style={{ transform: 'rotate(-90deg)' }}>
          <circle cx="98" cy="98" r={R} fill="none" stroke="#16202e" strokeWidth="10" />
          {arcs.map((a) => (
            <circle key={a.k} cx="98" cy="98" r={R} fill="none" stroke={a.c} strokeWidth="10" strokeLinecap="round"
              strokeDasharray={`${Math.max(mounted ? a.len - gap : 0, 0)} ${C}`} strokeDashoffset={-(a.off + gap / 2)}
              style={{ transition: 'stroke-dasharray 1.1s cubic-bezier(.22,.61,.36,1)', filter: `drop-shadow(0 0 4px ${a.glow})` }} />
          ))}
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ fontFamily: MONO, fontWeight: 700, color: '#e8edf5', letterSpacing: '-0.02em', lineHeight: 1 }}>
            <span style={{ fontSize: 46 }}>{total > 0 ? Math.round((exec.bull + exec.neutral * 0.5) / total * 100) : 0}</span><span style={{ fontSize: 22, color: '#8295a9' }}>%</span>
          </div>
          <div style={{ fontFamily: SANS, fontSize: 11, color: '#64748b', marginTop: 5, letterSpacing: '.06em', textTransform: 'uppercase' }}>bullish</div>
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 14 }}>

        <span style={{ fontFamily: SANS, fontSize: 19, fontWeight: 700, color: '#e8edf5', letterSpacing: '0.01em' }}>{exec.label}</span>

// ── Deep-dive chart with range toggle ─────────────────────────────────────────
function DeepChart({ card, cardId, color }) {
  const ranges = ['1M', '3M', '6M', '1Y', '5Y'];
  const [range, setRange] = useState('1Y');
  const [live, setLive] = useState(null);
  useEffect(() => {
    let alive = true;
    setLive(null);
    if (window.MarketHubData && cardId) {
      window.MarketHubData.loadHistory(cardId, range)
        .then((r) => { if (alive && r && r.values.length > 1) setLive(r); });
    }
    return () => { alive = false; };
  }, [cardId, range]);
  const W = 332, H = 150, top = 10, bot = 22;
  const conf = { '1M': [24, 0.16], '3M': [40, 0.135], '6M': [52, 0.115], '1Y': [60, 0.10], '5Y': [60, 0.08] };
  let arr;
  if (live && live.values.length > 1) {
    const vals = live.values, lo = Math.min(...vals), hi = Math.max(...vals), span = hi - lo || 1;
    arr = vals.map((x) => 0.08 + ((x - lo) / span) * 0.85);
  } else {
    const [n0, vol] = conf[range];
    let s = card.seed * 9301 + 49297 + range.length * 1733;
    const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    let v = 0.4; arr = [];
    for (let i = 0; i < n0; i++) { v += (rnd() - 0.5) * vol + card.trend * 0.013; v = Math.max(0.08, Math.min(0.93, v)); arr.push(v); }
  }
  const n = arr.length;
  const dx = W / (n - 1), yy = (p) => top + (1 - p) * (H - top - bot);
  const line = arr.map((p, i) => `${i ? 'L' : 'M'}${(i * dx).toFixed(1)},${yy(p).toFixed(1)}`).join(' ');
  const area = `${line} L${W},${H - bot} L0,${H - bot} Z`;
  const id = `dc${card.seed}`;
  return (
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: 'block' }}>
        <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor={color} stopOpacity="0.3" /><stop offset="1" stopColor={color} stopOpacity="0" />
        </linearGradient></defs>
        {[0.25, 0.5, 0.75].map((g) => (<line key={g} x1="0" x2={W} y1={top + g * (H - top - bot)} y2={top + g * (H - top - bot)} stroke="#16202e" strokeWidth="1" strokeDasharray="3 4" />))}
        <line x1="0" x2={W} y1={H - bot} y2={H - bot} stroke="#1e2d3d" strokeWidth="1" />
        <path d={area} fill={`url(#${id})`} />
        <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
        <circle cx={(n - 1) * dx} cy={yy(arr[n - 1])} r="3.5" fill={color} />
        <circle cx={(n - 1) * dx} cy={yy(arr[n - 1])} r="6.5" fill="none" stroke={color} strokeOpacity="0.35" strokeWidth="2" />
      </svg>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 10 }}>
        {ranges.map((r) => (
          <button key={r} onClick={() => setRange(r)} style={{ all: 'unset', cursor: 'pointer', flex: 1, textAlign: 'center', padding: '7px 0', borderRadius: 8,
            fontFamily: MONO, fontSize: 12, fontWeight: 600, color: r === range ? '#e8edf5' : '#64748b',
            background: r === range ? '#1b2736' : 'transparent', border: `1px solid ${r === range ? '#243446' : 'transparent'}` }}>{r}</button>
        ))}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 8, justifyContent: 'flex-end' }}>
        <span style={{ width: 6, height: 6, borderRadius: '50%', background: live ? '#22c55e' : '#64748b', boxShadow: live ? '0 0 6px #22c55e' : 'none' }} />

    let alive = true; setData(null);
    fetch(`/api/breadth-history?range=${RMAP[range]}`)
      .then((r) => r.json())
      .then((j) => {
        if (!alive) return;

        const nyse = cum(j.adid_nyse), nasdaq = cum(j.adid_nasdaq);
        if (nyse.length > 1 || nasdaq.length > 1) setData({ nyse, nasdaq });

  const W = 332, H = 150, top = 10, bot = 22;

    const dx = W / (n - 1), yy = (v) => top + (1 - (v - lo) / span) * (H - top - bot);

      {paths ? (
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: 'block' }}>
          {[0.25, 0.5, 0.75].map((g) => (<line key={g} x1="0" x2={W} y1={top + g * (H - top - bot)} y2={top + g * (H - top - bot)} stroke="#16202e" strokeWidth="1" strokeDasharray="3 4" />))}
          <line x1="0" x2={W} y1={paths.zeroY} y2={paths.zeroY} stroke="#475569" strokeWidth="1" strokeDasharray="4 3" />
          <path d={paths.nasdaq} fill="none" stroke="#f59e0b" strokeWidth="1.75" strokeLinejoin="round" strokeLinecap="round" />

// ── Error boundary for diagnostics ───────────────────────────────────────────
class DiagBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(e) { return { err: e ? (e.message || String(e)) : 'unknown' }; }
  render() {
    if (this.state.err) return (
      <div style={{ background: '#1a0a0a', border: '1px solid #ef4444', borderRadius: 12, padding: '10px 14px', fontFamily: MONO, fontSize: 11, color: '#ef4444', wordBreak: 'break-all' }}>
        Diagnostics error: {this.state.err}
      </div>
    );
    return this.props.children;
  }
}

// ── History calendar (seeded synthetic monthly bull/neutral/bear blocks) ──────
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function regimeHistoryData(seed, status, months) {
  let s = seed * 7919 + 104729;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const order = ['bearish','neutral','bullish'];
  const target = order.indexOf(status);
  let idx = Math.max(0, Math.min(2, target + (rnd() < 0.5 ? -1 : 1)));
  const out = [];
  for (let i = 0; i < months; i++) {
    const pull = (i / months) > 0.55 && rnd() < 0.45;
    if (pull) idx += Math.sign(target - idx) || 0;
    else if (rnd() < 0.28) idx += rnd() < 0.5 ? -1 : 1;
    idx = Math.max(0, Math.min(2, idx));
    out.push(order[idx]);
  }
  out[months - 1] = status;
  if (months > 1) out[months - 2] = rnd() < 0.6 ? status : out[months - 2];
  return out;
}
function getMonthLabels(n) {
  const now = new Date();
  return Array.from({ length: n }, (_, i) => {
    const d = new Date(now.getFullYear(), now.getMonth() - (n - 1 - i), 1);
    return MONTHS[d.getMonth()];
  });
}
function HistoryCalendar({ card }) {
  const hist   = regimeHistoryData(card.seed, card.status, 12);
  const labels = getMonthLabels(12);
  return (
    <div>
      <div style={{ fontFamily: SANS, fontSize: 10, fontWeight: 700, letterSpacing: '.12em', textTransform: 'uppercase', color: '#8295a9', marginBottom: 8 }}>{card.title} History</div>
      <div style={{ background: '#0d1520', border: '1px solid #1e2d3d', borderRadius: 14, padding: '14px 14px 10px' }}>
        <div style={{ display: 'flex', gap: 3 }}>
          {hist.map((st, i) => {
            const isLast = i === hist.length - 1;
            const c = (SIG[st] || SIG.neutral).c, glow = (SIG[st] || SIG.neutral).glow;
            return (
              <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5 }}>
                <div style={{ width: '100%', height: 28, borderRadius: 4, background: c,
                  opacity: isLast ? 1 : 0.5 + (i / 12) * 0.42,
                  boxShadow: isLast ? `0 0 8px ${glow}` : 'none',
                  outline: isLast ? '1px solid rgba(232,237,245,.45)' : 'none' }} />
                <span style={{ fontFamily: MONO, fontSize: 7.5, color: isLast ? '#cbd5e1' : '#475569', fontWeight: isLast ? 700 : 400 }}>{labels[i]}</span>
              </div>
            );
          })}
        </div>
        <div style={{ display: 'flex', gap: 14, marginTop: 10 }}>
          {[['bullish','Bullish'],['neutral','Neutral'],['bearish','Bearish']].map(([k, lab]) => (
            <div key={k} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
              <span style={{ width: 8, height: 8, borderRadius: 2, background: (SIG[k]||SIG.neutral).c, flexShrink: 0 }} />
              <span style={{ fontFamily: SANS, fontSize: 10, color: '#94a3b8' }}>{lab}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function CpiMobileChart() {
  const RMAP = { '1Y': '1y', '2Y': '2y', '5Y': '5y', '10Y': '10y' };
  const RANGES = ['1Y', '2Y', '5Y', '10Y'];
  const [range, setRange] = useState('5Y');
  const [data, setData]   = useState(null);

  useEffect(() => {
    let alive = true;
    setData(null);
    const mo = new Date().toISOString().slice(0, 7);
    fetch(`/api/cpi-history?range=${RMAP[range]}&d=${mo}`)
      .then(r => r.json())
      .then(j => {
        if (!alive || !Array.isArray(j.headline) || j.headline.length < 2) return;
        setData({ dates: j.dates, headline: j.headline, core: j.core || [] });
      })
      .catch(() => {});
    return () => { alive = false; };
  }, [range]);

  const W = 332, H = 160, top = 10, bot = 22;

  const latest = data ? [...(data.headline)].reverse().find(v => v != null) : null;
  const hColor = latest == null ? '#f59e0b' : latest > 0.4 ? '#ef4444' : latest > 0.167 ? '#f59e0b' : '#22c55e';

  let hArr = [], cArr = [], normFn = null;
  if (data) {
    const allVals = [...data.headline, ...data.core].filter(v => v != null && !isNaN(v));
    if (allVals.length > 1) {
      const lo = Math.min(...allVals), hi = Math.max(...allVals), span = hi - lo || 1;
      normFn = (v) => v != null && !isNaN(v) ? 0.07 + ((v - lo) / span) * 0.86 : null;
      hArr   = data.headline.map(normFn);
      cArr   = data.core.map(normFn);
      // threshold lines
      const tGreenNorm = normFn(0.167);
      const tRedNorm   = normFn(0.4);
      const yy = (p) => p != null ? top + (1 - p) * (H - top - bot) : null;
      var tGreenY = yy(tGreenNorm), tRedY = yy(tRedNorm);
    }
  }

  const n  = hArr.length;
  const dx = n > 1 ? W / (n - 1) : W;
  const yy = (p) => p != null ? top + (1 - p) * (H - top - bot) : null;

  const buildLine = (arr) => arr.map((p, i) =>
    p != null ? `${(i === 0 || arr[i-1] == null) ? 'M' : 'L'}${(i * dx).toFixed(1)},${yy(p).toFixed(1)}` : ''
  ).join(' ');

  const hLine = buildLine(hArr);
  const cLine = buildLine(cArr);
  const hArea = hLine ? `${hLine} L${((n-1)*dx).toFixed(1)},${H-bot} L0,${H-bot} Z` : '';

  // seed-based placeholder when loading
  const seed = 7;
  let placeholderArr = [];
  if (!data) {
    let s = seed * 9301 + 49297 + range.length * 1733;
    const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    let v = 0.5;
    for (let i = 0; i < 60; i++) { v += (rnd() - 0.5) * 0.15; v = Math.max(0.08, Math.min(0.93, v)); placeholderArr.push(v); }
  }
  const pn = placeholderArr.length;
  const pdx = pn > 1 ? W / (pn - 1) : W;
  const pLine = placeholderArr.map((p, i) => `${i ? 'L' : 'M'}${(i * pdx).toFixed(1)},${yy(p).toFixed(1)}`).join(' ');
  const pArea = pLine ? `${pLine} L${W},${H-bot} L0,${H-bot} Z` : '';

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
        <div>
          <div style={{ fontFamily: SANS, fontSize: 13, fontWeight: 600, color: '#cbd5e1' }}>CPI Inflation — Headline &amp; Core</div>
          <div style={{ fontFamily: SANS, fontSize: 10, color: '#8295a9', marginTop: 2 }}>MoM % change · seasonally adjusted</div>
        </div>
        {latest != null && (
          <div style={{ fontFamily: MONO, fontSize: 15, fontWeight: 700, color: hColor }}>
            {(latest >= 0 ? '+' : '') + latest.toFixed(2)}%
          </div>
        )}
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: 'block' }}>
        <defs>
          <linearGradient id="cpiGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stopColor="#a855f7" stopOpacity="0.25" />
            <stop offset="1" stopColor="#a855f7" stopOpacity="0" />
          </linearGradient>
        </defs>
        {[0.25, 0.5, 0.75].map((g) => (
          <line key={g} x1="0" x2={W} y1={top + g * (H - top - bot)} y2={top + g * (H - top - bot)} stroke="#16202e" strokeWidth="1" strokeDasharray="3 4" />
        ))}
        <line x1="0" x2={W} y1={H - bot} y2={H - bot} stroke="#1e2d3d" strokeWidth="1" />
        {/* Threshold lines */}
        {data && tGreenY != null && <line x1="0" x2={W} y1={tGreenY.toFixed(1)} y2={tGreenY.toFixed(1)} stroke="#22c55e" strokeWidth="1" strokeDasharray="4 4" strokeOpacity="0.5" />}
        {data && tRedY   != null && <line x1="0" x2={W} y1={tRedY.toFixed(1)}   y2={tRedY.toFixed(1)}   stroke="#ef4444" strokeWidth="1" strokeDasharray="4 4" strokeOpacity="0.5" />}
        {/* Placeholder */}
        {!data && <path d={pArea} fill="url(#cpiGrad)" />}
        {!data && <path d={pLine} fill="none" stroke="#a855f7" strokeWidth="1.5" strokeOpacity="0.3" strokeLinejoin="round" strokeLinecap="round" />}
        {/* Live data */}
        {data && hArea && <path d={hArea} fill="url(#cpiGrad)" />}
        {data && cLine && <path d={cLine} fill="none" stroke="#22d3ee" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />}
        {data && hLine && <path d={hLine} fill="none" stroke="#a855f7" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />}
        {/* End dot */}
        {data && hArr.length > 0 && hArr[n-1] != null && (
          <>
            <circle cx={((n-1)*dx).toFixed(1)} cy={yy(hArr[n-1]).toFixed(1)} r="3.5" fill="#a855f7" />

        ))}

          <span style={{ width: 6, height: 6, borderRadius: '50%', background: data ? '#22c55e' : '#64748b', boxShadow: data ? '0 0 6px #22c55e' : 'none' }} />
          <span style={{ fontFamily: SANS, fontSize: 10, color: '#8295a9' }}>{data ? 'Live · FRED' : 'Loading…'}</span>

    <div style={{ background: '#0d1520', border: '1px solid #1e2d3d', borderRadius: 13, padding: '14px 14px' }}>
      <div style={{ fontFamily: SANS, fontSize: 10, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: '#64748b', marginBottom: 10 }}>30-Day Sentiment</div>
      <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
        {days.map(b => {
          const bc = sentimentColor(b.sentiment);
          const isCurrent = b.date === currentDate;
          const isExp = expanded === b.date;
          const dayNum = new Date(b.date + 'T12:00:00Z').getUTCDate();
          return (
            <div key={b.date} onClick={() => setExpanded(isExp ? null : b.date)}
              style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '6px 5px',
                borderRadius: 7, background: isExp ? '#16202e' : isCurrent ? '#13202e' : '#111827',
                border: `1px solid ${isExp ? bc : isCurrent ? bc + '88' : '#1e2d3d'}`,
                minWidth: 32, cursor: 'pointer' }}>
              <span style={{ fontFamily: MONO, fontSize: 10, fontWeight: 700, color: bc }}>{b.sentiment > 0 ? '+' : ''}{b.sentiment}</span>
              <span style={{ fontFamily: SANS, fontSize: 9, color: '#475569' }}>{dayNum}</span>
            </div>
          );
        })}
      </div>
      {expanded && (() => {
        const b = days.find(x => x.date === expanded);
        if (!b) return null;
        const bc = sentimentColor(b.sentiment);
        const dl = new Date(b.date + 'T12:00:00Z').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        return (
          <div style={{ marginTop: 12, borderTop: '1px solid #1e2d3d', paddingTop: 12 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
              <span style={{ fontFamily: SANS, fontSize: 11, fontWeight: 700, color: '#cbd5e1' }}>{dl}</span>
              <span style={{ fontFamily: MONO, fontSize: 11, fontWeight: 700, color: bc }}>{b.sentiment > 0 ? '+' : ''}{b.sentiment}</span>
              <span style={{ fontFamily: SANS, fontSize: 9.5, color: '#64748b', padding: '1px 6px', borderRadius: 4, background: '#16202e' }}>{b.sector}</span>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
              {b.bullets.map((bullet, i) => (
                <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                  <span style={{ width: 4, height: 4, borderRadius: '50%', background: bc, flexShrink: 0, marginTop: 5 }} />
                  <span style={{ fontFamily: SANS, fontSize: 12, color: '#94a3b8', lineHeight: 1.55 }}>{bullet}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function DailyBriefDive({ brief, onBack }) {
  const history = useBriefHistory(!brief?.isWeekly);
  const [searchQuery, setSearchQuery] = useState('');
  const [searchResults, setSearchResults] = useState(null);
  const [searching, setSearching] = useState(false);

  const doSearch = () => {
    const q = searchQuery.trim();
    if (!q) return;
    setSearching(true);
    fetch('/api/daily-brief?search=' + encodeURIComponent(q), { credentials: 'same-origin' })
      .then(r => r.json())
      .then(d => { setSearchResults(d.results || []); setSearching(false); })
      .catch(() => setSearching(false));
  };

  const BackBtn = () => (
    <button onClick={onBack} style={{ all: 'unset', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', width: 34, height: 34, borderRadius: 9, background: '#0d1520', border: '1px solid #1e2d3d' }}>
      <svg width="9" height="15" viewBox="0 0 9 15"><path d="M7.5 1L1.5 7.5l6 6.5" stroke="#94a3b8" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>
    </button>
  );
  if (!brief) {
    return (
      <div style={{ position: 'absolute', inset: 0, background: '#080c14', display: 'flex', flexDirection: 'column' }}>
        <div style={{ paddingTop: 'env(safe-area-inset-top, 54px)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 11, padding: '4px 14px 12px' }}>
            <BackBtn />
            <span style={{ fontFamily: SANS, fontSize: 18, fontWeight: 700, color: '#e8edf5' }}>Daily Brief</span>
          </div>
        </div>
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <span style={{ fontFamily: SANS, fontSize: 13, color: '#475569' }}>Loading…</span>
        </div>
      </div>
    );
  }
  const sc = sentimentColor(brief.isWeekly ? (brief.avgSentiment ?? 0) : (brief.sentiment ?? 0));
  return (
    <div style={{ position: 'absolute', inset: 0, background: '#080c14', display: 'flex', flexDirection: 'column' }}>
      <div style={{ paddingTop: 'env(safe-area-inset-top, 54px)', background: 'linear-gradient(#080c14 80%, rgba(8,12,20,0))' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 11, padding: '4px 14px 12px' }}>
          <BackBtn />
          <span style={{ width: 9, height: 9, borderRadius: '50%', background: sc, boxShadow: `0 0 8px ${sc}` }} />
          <div>
            <div style={{ fontFamily: SANS, fontSize: 18, fontWeight: 700, color: '#e8edf5' }}>
              {brief.isWeekly ? 'Weekly Brief' : 'Daily Brief'}
            </div>
            <div style={{ fontFamily: SANS, fontSize: 11, color: '#64748b' }}>
              {brief.isWeekly ? brief.weekLabel
                : new Date(brief.date + 'T12:00:00Z').toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}
            </div>
          </div>
        </div>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 16px calc(34px + 22px)', display: 'flex', flexDirection: 'column', gap: 14 }}>
        {brief.isWeekly ? brief.briefs.map((d) => {
          const dc = sentimentColor(d.sentiment);
          const dl = new Date(d.date + 'T12:00:00Z').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
          return (
            <div key={d.date} style={{ background: '#0d1520', border: '1px solid #1e2d3d', borderLeft: `3px solid ${dc}`, borderRadius: 13, padding: '13px 14px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                <span style={{ fontFamily: SANS, fontSize: 12, fontWeight: 700, color: '#cbd5e1' }}>{dl}</span>
                <span style={{ fontFamily: MONO, fontSize: 11, fontWeight: 700, color: dc }}>{d.sentiment > 0 ? '+' : ''}{d.sentiment}</span>
                <span style={{ fontFamily: SANS, fontSize: 10, color: '#64748b', padding: '1px 6px', borderRadius: 4, background: '#16202e' }}>{d.sector}</span>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {d.bullets.map((b, i) => (
                  <div key={i} style={{ display: 'flex', gap: 9, alignItems: 'flex-start' }}>
                    <span style={{ width: 4, height: 4, borderRadius: '50%', background: dc, flexShrink: 0, marginTop: 6 }} />
                    <span style={{ fontFamily: SANS, fontSize: 13, color: '#94a3b8', lineHeight: 1.55 }}>{b}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        }) : (
          <div style={{ background: '#0d1520', border: '1px solid #1e2d3d', borderLeft: `3px solid ${sc}`, borderRadius: 13, padding: '14px 14px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
              <span style={{ fontFamily: MONO, fontSize: 15, fontWeight: 700, color: sc }}>{brief.sentiment > 0 ? '+' : ''}{brief.sentiment}</span>
              <span style={{ fontFamily: SANS, fontSize: 10, color: '#64748b', padding: '2px 7px', borderRadius: 4, background: '#16202e' }}>{brief.sector}</span>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {brief.bullets.map((b, i) => (
                <div key={i} style={{ display: 'flex', gap: 9, alignItems: 'flex-start' }}>
                  <span style={{ width: 5, height: 5, borderRadius: '50%', background: sc, flexShrink: 0, marginTop: 6 }} />
                  <span style={{ fontFamily: SANS, fontSize: 13.5, color: '#94a3b8', lineHeight: 1.6 }}>{b}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {!brief.isWeekly && <BriefHistoryStrip history={history} currentDate={brief.date} />}

        {/* ── Search ── */}
        <div style={{ background: '#0d1520', border: '1px solid #1e2d3d', borderRadius: 13, padding: '14px 14px' }}>
          <div style={{ fontFamily: SANS, fontSize: 10, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: '#64748b', marginBottom: 10 }}>Search Close Updates</div>
          <div style={{ display: 'flex', gap: 8 }}>
            <input type="text" value={searchQuery}
              onChange={e => setSearchQuery(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && doSearch()}
              placeholder="e.g. Fed, inflation, yield…"
              style={{ flex: 1, minWidth: 0, background: '#111827', border: '1px solid #1e2d3d', borderRadius: 8, padding: '9px 12px',
                fontFamily: SANS, fontSize: 13, color: '#e8edf5', outline: 'none' }} />
            <button onClick={doSearch}
              style={{ all: 'unset', cursor: 'pointer', padding: '9px 14px', borderRadius: 8,
                background: searching ? '#111827' : '#1b2736', border: '1px solid #243446',
                fontFamily: SANS, fontSize: 13, color: '#94a3b8', whiteSpace: 'nowrap', flexShrink: 0 }}>
              {searching ? '…' : 'Search'}
            </button>
          </div>
          {searchResults !== null && (
            <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 7 }}>
              {(() => {
                const q = searchQuery.trim().toLowerCase();
                const matches = [];
                searchResults.forEach(r => {
                  const dl = new Date(r.date + 'T12:00:00Z').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                  const rc = sentimentColor(r.sentiment);
                  r.bullets.forEach(b => {
                    if (b.toLowerCase().includes(q)) matches.push({ dl, rc, b });
                  });
                });
                if (!matches.length) return <span style={{ fontFamily: SANS, fontSize: 12, color: '#64748b' }}>No matching bullets found.</span>;
                return matches.map((m, i) => {
                  const idx    = m.b.toLowerCase().indexOf(q);
                  const before = m.b.slice(0, idx);
                  const hit    = m.b.slice(idx, idx + q.length);
                  const after  = m.b.slice(idx + q.length);
                  return (
                    <div key={i} style={{ background: '#111827', border: '1px solid #1e2d3d', borderLeft: `3px solid ${m.rc}`, borderRadius: 8, padding: '9px 11px' }}>
                      <div style={{ fontFamily: MONO, fontSize: 9.5, fontWeight: 700, color: '#475569', marginBottom: 5 }}>{m.dl}</div>
                      <span style={{ fontFamily: SANS, fontSize: 12.5, color: '#94a3b8', lineHeight: 1.55 }}>
                        {before}<mark style={{ background: '#78350f55', color: '#fbbf24', borderRadius: 3, padding: '0 2px' }}>{hit}</mark>{after}
                      </span>
                    </div>
                  );
                });
              })()}
            </div>
          )}
        </div>

        <div style={{ fontFamily: SANS, fontSize: 10.5, color: '#475569', textAlign: 'center', paddingBottom: 4 }}>
          Source: Briefing.com Close Update
        </div>
      </div>
    </div>
  );
}

// ── Macro Brief deep-dive ─────────────────────────────────────────────────────
function MacroBriefDive({ brief, loading, onBack }) {
  const dateLabel = brief?.isWeekly ? brief.weekLabel
    : brief?.date ? new Date(brief.date + 'T12:00:00Z').toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })
    : null;
  return (
    <div style={{ position: 'absolute', inset: 0, background: '#080c14', display: 'flex', flexDirection: 'column' }}>
      <div style={{ paddingTop: 'env(safe-area-inset-top, 54px)', background: 'linear-gradient(#080c14 80%, rgba(8,12,20,0))' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 11, padding: '4px 14px 12px' }}>
          <button onClick={onBack} style={{ all: 'unset', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', width: 34, height: 34, borderRadius: 9, background: '#0d1520', border: '1px solid #1e2d3d' }}>
            <svg width="9" height="15" viewBox="0 0 9 15"><path d="M7.5 1L1.5 7.5l6 6.5" stroke="#94a3b8" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>
          </button>
          <span style={{ width: 9, height: 9, borderRadius: '50%', background: '#60a5fa', boxShadow: '0 0 8px #60a5fa' }} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontFamily: SANS, fontSize: 18, fontWeight: 700, color: '#e8edf5' }}>Macro Brief</div>
            {dateLabel && <div style={{ fontFamily: SANS, fontSize: 11, color: '#64748b' }}>{dateLabel}</div>}
          </div>
          <span style={{ fontFamily: SANS, fontSize: 10, fontWeight: 600, color: '#60a5fa', padding: '3px 8px', borderRadius: 5, background: '#0d1e35', border: '1px solid #1a3a5c', flexShrink: 0 }}>✦ CLAUDE</span>
        </div>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 16px calc(34px + 22px)', display: 'flex', flexDirection: 'column', gap: 14 }}>
        {loading && (
          <div style={{ background: '#0d1520', border: '1px solid #1e2d3d', borderRadius: 13, padding: '18px 16px' }}>
            <span style={{ fontFamily: SANS, fontSize: 13, color: '#475569' }}>Synthesizing structural signals with recent market action…</span>
          </div>
        )}
        {!loading && !brief && (
          <div style={{ background: '#0d1520', border: '1px solid #1e2d3d', borderRadius: 13, padding: '18px 16px' }}>
            <span style={{ fontFamily: SANS, fontSize: 13, color: '#475569' }}>Unavailable — synthesis runs after market close when today's brief and scorecard are ready.</span>
          </div>
        )}
        {brief?.narrative && (
          <div style={{ background: '#0d1520', border: '1px solid #1e2d3d', borderLeft: '3px solid #60a5fa', borderRadius: 13, padding: '18px 16px' }}>
            <p style={{ fontFamily: SANS, fontSize: 14.5, color: '#94a3b8', lineHeight: 1.72, margin: 0 }}>{brief.narrative}</p>
          </div>
        )}
        {brief?.score && (
          <div style={{ display: 'flex', gap: 8 }}>
            <div style={{ flex: 1, background: '#0d1520', border: '1px solid #1e2d3d', borderRadius: 12, padding: '11px 12px' }}>
              <div style={{ fontFamily: MONO, fontSize: 16, fontWeight: 700, color: '#e8edf5' }}>{brief.score}/10</div>
              <div style={{ fontFamily: SANS, fontSize: 10, color: '#94a3b8', marginTop: 3 }}>Scorecard</div>
            </div>
            <div style={{ flex: 1, background: '#0d1520', border: '1px solid #1e2d3d', borderRadius: 12, padding: '11px 12px' }}>
              <div style={{ fontFamily: MONO, fontSize: 16, fontWeight: 700, color: '#60a5fa' }}>Haiku</div>
              <div style={{ fontFamily: SANS, fontSize: 10, color: '#94a3b8', marginTop: 3 }}>Claude model</div>
            </div>
          </div>
        )}
        <div style={{ fontFamily: SANS, fontSize: 10.5, color: '#475569', textAlign: 'center', paddingBottom: 4 }}>
          Synthesized by Claude Haiku · Briefing.com × Scorecard
        </div>
      </div>

  );
}

// ── Home screen ───────────────────────────────────────────────────────────────

        {D.horizons ? <HorizonHeroMobile horizons={D.horizons} exec={D.exec} /> : <HeroGauge exec={D.exec} />}
        <div style={{ height: 1, background: '#16202e' }} />

        <div style={{ height: 1, background: '#16202e' }} />

        {/* Structural + Crowd card groups */}
        {D.groups.map((g) => (
          <div key={g.label} style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <div style={SL}>{g.label}</div>
            {g.ids.map((id) => D.cards[id]
              ? id === 'yield'
                ? <YieldCardRow key={id} card={D.cards[id]} onTap={() => onOpen(id)} />
                : id === 'crowdsignals'
                ? <CrowdSignalsCardRow key={id} card={D.cards[id]} onTap={() => onOpen(id)} />
                : <CardRow key={id} card={D.cards[id]} onTap={() => onOpen(id)} />

        {/* Daily Context — Daily Brief + Macro Brief */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div style={SL}>Daily Context</div>
          <DailyBriefRow brief={dailyBrief} onTap={() => onOpen('dailybrief')} />
          <MacroBriefRow brief={macroBrief} loading={macroBriefLoading} onTap={() => onOpen('macrobrief')} />

}

// ── Root ──────────────────────────────────────────────────────────────────────
function Glance() {
  const D                              = useGlance();
  const dailyBrief                     = useDailyBrief();
  const { brief: macroBrief, loading: macroBriefLoading } = useMacroBrief();
  const [active, setActive] = useState(() => {
    try { const v = localStorage.getItem('mh-active'); return v ? v : null; } catch { return null; }
  });
  const open  = (id) => { setActive(id);  try { localStorage.setItem('mh-active', id); } catch {} };
  const close = ()   => { setActive(null); try { localStorage.removeItem('mh-active'); } catch {} };
  const wrapRef = useRef(null);
  useEffect(() => {
    let el = wrapRef.current;
    while (el) { if (typeof el.scrollTop === 'number') el.scrollTop = 0; el = el.parentElement; }
  }, [active]);

  let screen;
  if (active === 'dailybrief') {
    screen = <DailyBriefDive brief={dailyBrief} onBack={close} />;
  } else if (active === 'macrobrief') {
    screen = <MacroBriefDive brief={macroBrief} loading={macroBriefLoading} onBack={close} />;
  } else if (active && D.cards[active]) {
    screen = <DeepDive key={active} card={D.cards[active]} cardId={active} onBack={close} />;
  } else {
    screen = (
      <Home D={D}
        dailyBrief={dailyBrief}
        macroBrief={macroBrief}
        macroBriefLoading={macroBriefLoading}
        onOpen={open}
      />
    );
  }

  return (
    <div ref={wrapRef} style={{ position: 'relative', height: '100%', background: '#080c14' }}>
      {screen}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Glance />);
</script>
