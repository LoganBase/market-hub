name: Daily Market Data Seed

on:
  schedule:
    # 21:30 UTC = 5:30 PM ET — 90 min after US market close, Mon–Fri
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Seed mode'
        required: false
        default: '--daily'
        type: choice
        options:
          - '--daily'
          - ''

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # TODO: pin to commit SHA for supply-chain hardening, e.g.:
      #   actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      #   actions/setup-python@0b93645e9fea7318ecaed2XXXXXXX           # v5.x.x
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: seed/requirements.txt

      - name: Install dependencies
        run: pip install -r seed/requirements.txt

      - name: Run seeder
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_D1_DB_ID: ${{ secrets.CF_D1_DB_ID }}
          PYTHONIOENCODING: utf-8
        run: python seed/seed.py ${{ github.event.inputs.mode || '--daily' }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily seed failed — D1 data may be stale. Check the Actions log."
