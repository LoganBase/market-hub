<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Hub — Mobile Daily Glance</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(1200px 700px at 50% -10%, #141c28 0%, rgba(20,28,40,0) 60%),
      #0a0f16;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 36px 20px;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .stage { display: flex; align-items: center; justify-content: center; }
  @keyframes mh-slide { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>
<div id="root" class="stage"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="glance-data.js"></script>
<script src="market-hub-adapter.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="../desktop/desktop-parts.jsx?v=20260703r"></script>
<script type="text/babel" src="Glance.jsx"></script>
<script type="text/babel">
  const { IOSDevice, Glance } = window;
  function App() {
    return (
      <IOSDevice dark>
        <Glance />
      </IOSDevice>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
